name: tropical-virus-phylo

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: tropical-virus-phylo-backend
    ports:
      - "8000:8000"
    environment:
      NCBI_EMAIL: ${NCBI_EMAIL:-}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tropical-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: tropical-virus-phylo-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - tropical-network
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
      additional_contexts:
        backend_image: service:backend
    image: tropical-virus-phylo-streamlit
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://backend:8000
      NCBI_EMAIL: ${NCBI_EMAIL:-}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - tropical-network
    restart: unless-stopped

networks:
  tropical-network:
    name: tropical-virus-phylo-network
