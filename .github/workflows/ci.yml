name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        run: pytest -q

      - name: Pipeline smoke test (synthetic demo, no MLflow)
        run: python main.py --demo --no-mlflow

      - name: API health check
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break || sleep 1
          done
          curl -sf http://127.0.0.1:8000/health

      - name: Import Streamlit app
        run: python -c "import app.streamlit_app; print('streamlit app imports cleanly')"
